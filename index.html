<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLEU PRODUCTION TV | TICKER NEWS PREMIUM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=500;700;800;900&family=JetBrains+Mono:wght=700;800&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
  }

  body {
    background: transparent;
    overflow: hidden;
    font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
  }

  /* === TICKER PRINCIPAL === */
  .ticker-container {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 44px;
    background: linear-gradient(135deg, #090D1A 0%, #0F172A 100%);
    backdrop-filter: blur(5px);
    display: flex;
    align-items: center;
    z-index: 1000;
    border-top: 2px solid rgba(59, 130, 246, 0.7);
    box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.6);
    perspective: 800px;
  }

  /* ===== BLOC MARQUE ===== */
  .brand-badge {
    background: #1E3A8A;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 110px;
    flex-shrink: 0;
    position: relative;
    z-index: 20;
    box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
    border-right: 1px solid rgba(96, 165, 250, 0.5);
    overflow: hidden;
  }

  .brand-badge::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(30, 58, 138, 0) 0%, rgba(59, 130, 246, 0.25) 100%);
    pointer-events: none;
  }

  .badge-logo,
  .badge-text {
    position: absolute;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
    will-change: transform, opacity;
  }

  .badge-logo {
    max-height: 70%;
    max-width: 70%;
    object-fit: contain;
    filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
    opacity: 0;
    transform: scale(0.7) rotate(-10deg);
  }

  .badge-text {
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 2px;
    background: linear-gradient(120deg, #FFFFFF, #93C5FD);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0;
    transform: scale(0.8);
  }

  .badge-logo.visible { opacity: 1; transform: scale(1) rotate(0deg); }
  .badge-text.visible { opacity: 1; transform: scale(1); }

  /* ===== ZONE TICKER TEXTE ===== */
  .ticker-track {
    flex: 1;
    height: 100%;
    position: relative;
    overflow: hidden;
    background: rgba(4, 8, 20, 0.4);
    transform-style: preserve-3d;
  }

  .slide-wrapper {
    position: absolute;
    left: 24px;
    top: 0;
    height: 100%;
    display: flex;
    align-items: center;
    width: max-content;
    opacity: 0;
    transform: scale(0.85) translateZ(-50px) rotateX(15deg);
    transition: opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform, opacity;
  }

  .slide-wrapper.active {
    opacity: 1;
    transform: scale(1) translateZ(0) rotateX(0deg);
  }

  .slide-wrapper.exit {
    opacity: 0;
    transform: scale(0.9) translateZ(-80px) rotateX(-20deg);
    transition: opacity 0.4s ease-in, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    will-change: transform, opacity;
  }

  .scroll-long {
    animation: smoothScroll var(--duration) linear forwards;
  }

  @keyframes smoothScroll {
    0% { transform: translateX(0) scale(1) translateZ(0) rotateX(0deg); }
    100% { transform: translateX(var(--scroll-dist)) scale(1) translateZ(0) rotateX(0deg); }
  }

  .news-slide {
    font-size: 14px;
    font-weight: 700;
    color: #F8FAFC;
    white-space: nowrap;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    display: inline-block;
  }

  /* ===== BADGES SIMPLIFIÉS ===== */
  .category-badge {
    color: #38BDF8 !important;
    font-weight: 900;
    background: rgba(56, 189, 248, 0.15);
    border: 1px solid rgba(56, 189, 248, 0.4);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    letter-spacing: 1px;
    margin-right: 10px;
    display: inline-block;
    vertical-align: middle;
    box-shadow: 0 0 12px rgba(56, 189, 248, 0.1);
  }

  .category-separator {
    color: rgba(56, 189, 248, 0.6);
    margin-right: 12px;
    font-weight: 700;
    font-size: 14px;
    display: inline-block;
    vertical-align: middle;
  }

  /* ===== MÉTÉO ===== */
  .weather-panel {
    background: linear-gradient(145deg, #16224F, #0B0F19);
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 8px;
    flex-shrink: 0;
    border-left: 2px solid rgba(59, 130, 246, 0.5);
    box-shadow: -4px 0 12px rgba(0, 0, 0, 0.4);
    min-width: 180px;
    justify-content: center;
    backdrop-filter: blur(4px);
    z-index: 20;
  }

  .weather-icon-modern {
    width: 24px;
    height: 24px;
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
  }

  .weather-info {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 0, 0, 0.35);
    padding: 4px 12px;
    border-radius: 40px;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  .city-label {
    color: #93C5FD;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .temp-value {
    color: #FDE047;
    font-weight: 800;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace; 
  }

  .weather-content-wrapper {
    transition: opacity 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ticker-mask {
    position: absolute;
    right: 0;
    top: 0;
    width: 70px;
    height: 100%;
    background: linear-gradient(270deg, #0F172A 15%, transparent);
    pointer-events: none;
    z-index: 5;
  }

  @media (max-width: 640px) {
    .ticker-container { height: 40px; }
    .brand-badge { width: 90px; }
    .weather-panel { min-width: 145px; padding: 0 8px; }
    .news-slide { font-size: 12px; }
  }

  /* Surlignages contextuels */
  .highlight-red { color: #FF4B5C; font-weight: 900; background: rgba(255, 75, 92, 0.12); border-radius: 4px; padding: 1px 4px; }
  .highlight-war { color: #FF3333; font-weight: 900; text-shadow: 0 0 8px rgba(255,51,51,0.3); background: rgba(255, 0, 0, 0.15); border-radius: 4px; padding: 1px 5px; border: 1px solid rgba(255,51,51,0.2); }
  .highlight-politics { color: #FFA333; font-weight: 800; background: rgba(255, 163, 51, 0.1); border-radius: 4px; padding: 1px 4px; }
  .highlight-blue { color: #38BDF8; font-weight: 800; }
  .highlight-green { color: #4ADE80; font-weight: 800; }
  .highlight-yellow { color: #FDE047; font-weight: 800; }
</style>
</head>
<body>

<div class="ticker-container">
  <div class="brand-badge">
    <img class="badge-logo" src="LOGO-BLEU-PRODUCTION-BON-02.png" alt="BLEU PRODUCTION">
    <span class="badge-text">INFO</span>
  </div>

  <div class="ticker-track" id="tickerTrack">
    <div id="slideWrapper" class="slide-wrapper">
      <div id="newsSlide" class="news-slide">CHARGEMENT DES FLUX DE PRODUCTION...</div>
    </div>
    <div class="ticker-mask"></div>
  </div>

  <div class="weather-panel">
    <div id="weatherWrapper" class="weather-content-wrapper">
      <img id="weatherIcon" class="weather-icon-modern" src="" style="display: none;" alt="météo">
      <div class="weather-info">
        <span id="cityName" class="city-label">--</span>
        <span id="temperature" class="temp-value">--°C</span>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    // 1. ROTATION LOGO / TEXTE
    const logoImg = document.querySelector('.badge-logo');
    const infoSpan = document.querySelector('.badge-text');
    const DUREE_LOGO = 5500;
    const DUREE_INFO = 3000;

    function startBadgeRotation() {
      infoSpan.classList.remove('visible');
      logoImg.classList.add('visible');
      setTimeout(() => {
        logoImg.classList.remove('visible');
        infoSpan.classList.add('visible');
        setTimeout(() => { startBadgeRotation(); }, DUREE_INFO);
      }, DUREE_LOGO);
    }
    startBadgeRotation();

    // 2. MÉTÉO (API)
    const API_KEY = "e7a735f3ae4e43acbcf164503262904";
    const cities = [
      { name: "Port-au-Prince", label: "HAÏTI" },
      { name: "London", label: "LONDRES" },
      { name: "Miami", label: "MIAMI" },
      { name: "Paris", label: "PARIS" }
    ];
    let currentCityIndex = 0;
    const weatherIconEl = document.getElementById('weatherIcon');
    const cityNameSpan = document.getElementById('cityName');
    const tempSpan = document.getElementById('temperature');
    const weatherWrapper = document.getElementById('weatherWrapper');

    async function fetchWeather() {
      const target = cities[currentCityIndex];
      if (!target) return;
      try {
        const response = await fetch(`https://api.weatherapi.com/v1/current.json?key=${API_KEY}&q=${target.name}&lang=fr`);
        if (!response.ok) throw new Error();
        const data = await response.json();
        weatherWrapper.style.opacity = '0';
        setTimeout(() => {
          cityNameSpan.textContent = target.label;
          tempSpan.innerHTML = `${Math.round(data.current.temp_c)}°C`;
          weatherIconEl.src = "https:" + data.current.condition.icon;
          weatherIconEl.style.display = 'inline-block';
          weatherWrapper.style.opacity = '1';
        }, 250);
        currentCityIndex = (currentCityIndex + 1) % cities.length;
      } catch (e) {
        currentCityIndex = (currentCityIndex + 1) % cities.length;
      }
    }
    fetchWeather();
    setInterval(fetchWeather, 10000);

    // 3. FLUX NEWS & MESSAGES PERSOS
    const staticAnnouncements = [
      "[BLEU PRODUCTION] • KONN TÈT OU KONN LAKAY OU",
      "[BLEU PRODUCTION] • REJOIGNEZ-NOUS • ABONNEZ-VOUS ET ACTIVEZ LA CLOCHE DE NOTIFICATION"
    ];

    let currentRssNews = []; // Stocke uniquement les news des flux RSS
    let globalQueue = [...staticAnnouncements]; // File finale combinée
    let nextRssBuffer = null; // Zone tampon pour les mises à jour en tâche de fond
    let currentMsgIndex = 0;

    function advancedHighlight(text) {
      let result = text;

      if (result.startsWith('[') && result.includes(']')) {
        const closeBracketIndex = result.indexOf(']');
        let category = result.substring(1, closeBracketIndex).trim().toUpperCase();
        let content = result.substring(closeBracketIndex + 1).trim();
        
        if (content.startsWith('•')) {
          content = content.substring(1).trim();
        }

        result = `<span class="category-badge">${category}</span><span class="category-separator">|</span>${content}`;
      }

      const highlights = [
        { regex: /\b(GUERRE|CONFLIT|ATTAQUE|BOMBARDEMENT|FRAPPE|EXPLO(SION|SIONS)|MILITAIRE|ARMÉE|MISSILES?|COMBATS|DRONES?|SÉCURITÉ|CRISIS|ALERTE|OTAN|PENTAGONE|NUCLÉAIRE)\b/gi, class: 'highlight-war' },
        { regex: /\b(POLITIQUE|GOUVERNEMENT|ÉLECTION|MINISTRE|PRÉSIDENT|DIPLOMATIE|TRAITÉ|SÉNAT|PARLEMENT|CONSEIL DE SÉCURITÉ|ONU|ÉLYSÉE|MAISON BLANCHE|KREMLIN|NÉGOCIATIONS)\b/gi, class: 'highlight-politics' },
        { regex: /\b(HAITI|HAÏTI|PORT-AU-PRINCE|UKRAINE|GAZA|PROCHE-ORIENT|WASHINGTON|MOSCOU|PEKIN|PARIS)\b/gi, class: 'highlight-red' },
        { regex: /\b(ÉCONOMIE|FINANCE|BOURSE|INFLATION|TAUX|PETROLE|BARRIL)\b/gi, class: 'highlight-blue' },
        { regex: /\b(BASKET|NBA|LAKERS|CELTICS|FOOT|MATCH|LIVE|SCORE|CHAMPIONS|PRO M|LEBRON|CURRY|FINALES?|BALLON|MUTUELLE|TRANSFERT|JO\b)/gi, class: 'highlight-yellow' }
      ];
      
      for (let h of highlights) {
        result = result.replace(h.regex, match => `<span class="${h.class}">${match}</span>`);
      }
      return result;
    }

    async function fetchAggregatedNews() {
      const sources = [
        { type: "MONDE", url: "https://www.france24.com/fr/monde/rss" },
        { type: "MONDE", url: "https://www.rfi.fr/fr/monde/rss" },
        { type: "MONDE", url: "https://feeds.bbci.co.uk/afrique/rss.xml" }, 
        { type: "MONDE", url: "https://www.courrierinternational.com/feed/all/rss.xml" },
        { type: "MONDE", url: "https://www.rfi.fr/fr/europe/rss" },
        { type: "MONDE", url: "https://www.lemonde.fr/international/rss_full.xml" },
        { type: "MONDE", url: "https://information.tv5monde.com/moyen-orient/rss" },
        { type: "MONDE", url: "https://www.latribune.fr/entreprises-finance/industrie/aeronautique-defense/rss.xml" },
        
        { type: "ACTU", url: "https://www.haitilibre.com/haitilibre.xml" },
        { type: "ACTU", url: "https://rezonodwes.com/?feed=rss2" },
        { type: "ACTU", url: "https://lenouvelliste.com/rss.xml" },

        { type: "SPORTS", url: "https://www.basketusa.com/feed/" },
        { type: "SPORTS", url: "https://lequipe.fr/rss/actu_rss.xml" },
        { type: "SPORTS", url: "https://www.eurosport.fr/rss.xml" },
        { type: "SPORTS", url: "https://www.footmercato.net/flux-rss" }
      ];
      
      let dynamicNews = [];
      const fetchPromises = sources.map(async (source) => {
        try {
          const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(source.url)}`;
          const response = await fetch(proxyUrl);
          const data = await response.json();
          if (data && data.items) {
            return data.items.slice(0, 8).map(item => {
              let title = (item.title || "").trim().toUpperCase();
              return `[${source.type}] ${title}`;
            });
          }
        } catch (e) {}
        return [];
      });
      
      try {
        const results = await Promise.allSettled(fetchPromises);
        for (const res of results) {
          if (res.status === 'fulfilled' && res.value.length) {
            dynamicNews.push(...res.value);
          }
        }
      } catch(e) {}
      
      dynamicNews.sort(() => 0.5 - Math.random());
      
      // On garde 45 news max et on nettoie les doublons
      let cleanedRss = [...new Map(dynamicNews.slice(0, 45).map(m => [m.substring(0, 85), m])).values()];
      return cleanedRss;
    }

    const newsElement = document.getElementById('newsSlide');
    const slideWrapper = document.getElementById('slideWrapper');
    const tickerTrack = document.getElementById('tickerTrack');
    let animationTimeout = null;
    let scrollTimeout = null;

    function applyScrollIfNeeded() {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const containerWidth = tickerTrack.offsetWidth - 30;
          const textWidth = slideWrapper.getBoundingClientRect().width; 
          
          if (textWidth > containerWidth) {
            const deltaX = -(textWidth - containerWidth + 80);
            const durationSec = Math.min(Math.max(Math.abs(deltaX) / 55, 6), 45);
            
            slideWrapper.style.setProperty('--scroll-dist', `${deltaX}px`);
            slideWrapper.style.setProperty('--duration', `${durationSec}s`);
            
            slideWrapper.classList.add('scroll-long');
            
            scrollTimeout = setTimeout(() => { nextMessage(); }, (durationSec * 1000) + 1500);
          } else {
            scrollTimeout = setTimeout(() => { nextMessage(); }, 6500);
          }
        });
      });
    }

    function displayCurrentMessage() {
      if (!globalQueue.length) { 
        globalQueue = [...staticAnnouncements]; 
        currentMsgIndex = 0; 
      }
      
      newsElement.innerHTML = advancedHighlight(globalQueue[currentMsgIndex]);
      
      slideWrapper.classList.remove('active', 'exit', 'scroll-long');
      void slideWrapper.offsetWidth; 
      
      slideWrapper.classList.add('active');
      animationTimeout = setTimeout(() => { applyScrollIfNeeded(); }, 1200);
    }
    
    function nextMessage() {
      if (animationTimeout) clearTimeout(animationTimeout);
      if (scrollTimeout) clearTimeout(scrollTimeout);
      
      slideWrapper.classList.remove('active');
      slideWrapper.classList.add('exit');
      
      setTimeout(() => {
        currentMsgIndex++;
        
        // CONFORME À TA DEMANDE : Si on a parcouru toute la file (Annonces d'intro + Flux RSS)
        if (currentMsgIndex >= globalQueue.length) {
          currentMsgIndex = 0; // On revient au début
          
          // S'il y a une mise à jour des flux RSS prête en arrière-plan, on l'adopte
          if (nextRssBuffer && nextRssBuffer.length > 0) {
            currentRssNews = nextRssBuffer;
            nextRssBuffer = null;
          }
          
          // AVANT CHAQUE RECOMMENCEMENT : On reconstruit la file avec les annonces en PREMIER
          globalQueue = [...staticAnnouncements, ...currentRssNews];
        }
        
        displayCurrentMessage();
      }, 400);
    }
    
    async function refreshNewsQueue() {
      const freshRss = await fetchAggregatedNews();
      if (freshRss && freshRss.length > 3) {
        // On stocke sagement dans la zone tampon sans écraser la lecture en cours
        nextRssBuffer = freshRss;
      }
    }
    
    // Initialisation au lancement du script
    (async () => {
      currentRssNews = await fetchAggregatedNews();
      // Première construction : Annonces d'abord, puis flux RSS
      globalQueue = [...staticAnnouncements, ...currentRssNews];
      displayCurrentMessage();
    })();
    
    // Tâche de fond : Actualise la zone tampon des flux toutes les 10 minutes
    setInterval(refreshNewsQueue, 10 * 60 * 1000);
    setTimeout(() => { if (window.location) window.location.reload(); }, 50 * 60 * 1000);
  })();
</script>
</body>
</html>
